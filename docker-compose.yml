version: '3.9'

services:
  app_api:
    build: ./app_api
    container_name: api_service
    ports:
      - "8003:8000"
    networks:
      - app_network


  app_front:
    build: ./app_front
    container_name: front_service
    ports:
      - "8502:8501"
    networks:
      - app_network
  
  db:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/db_data
    networks:
      - app_network

volumes:
  db_data

networks:
  app_network:
    driver: bridge